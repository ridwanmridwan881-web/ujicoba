<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Laptop Ridwan</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    header{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }

    header h1{
      font-size:35px;
    }

    .produk{
      display:flex;
      justify-content:center;
      gap:25px;
      flex-wrap:wrap;
      padding:40px;
    }

    .card{
      background:white;
      width:260px;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card h2{
      margin-bottom:10px;
    }

    .card p{
      color:gray;
      margin-bottom:10px;
    }

    .harga{
      color:green;
      font-size:22px;
      margin-bottom:15px;
      font-weight:bold;
    }

    button{
      background:#111;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:green;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
    }

    @media(max-width:768px){
      .produk{
        flex-direction:column;
        align-items:center;
      }
    }.search-box{
  text-align:center;
  margin-top:20px;
}

.search-box input{
  width:300px;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  width:260px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.4s;
}body{
  background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
  color:white;
  animation: muncul 1s ease;
  @keyframes muncul{
  from{
    opacity:0;
    transform:translateY(50px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}
}
  </style>
</head>
<body>

  <header>
    <h1>TOKO LAPTOP RIDWAN</h1>
    <p>Laptop Gaming & Kantor Terbaik</p>
  </header>

  <section class="produk">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1593642702821-c8da6771f0c6" alt="Laptop">
      
      <div class="card-content">
        <h2>ASUS ROG</h2>
        <p>Intel i7 • RTX 4060 • SSD 1TB • 16GB RAM</p>
        <div class="harga">Rp 15.000.000</div>
        <button onclick="beli()">Beli Sekarang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8" alt="Laptop">
      
      <div class="card-content">
        <h2>Acer Nitro 5</h2>
        <p>Ryzen 7 • RTX 4050 • 16GB RAM</p>
        <div class="harga">Rp 13.500.000</div>
        <button onclick="beli()">Beli Sekarang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853" alt="Laptop">
      
      <div class="card-content">
        <h2>Lenovo Legion</h2>
        <p>Intel i5 • RTX 3050 • 8GB RAM</p>
        <div class="harga">Rp 11.000.000</div>
        <button onclick="beli()">Beli Sekarang</button>
      </div>
    </div>

  </section>

  <footer>
    <p>© 2026 Toko Laptop Ridwan</p>
  </footer>

  <script>
    function beli(){
      alert("Produk berhasil ditambahkan!");
    }
  </script>

</body>
